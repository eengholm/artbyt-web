<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // Base styles injected into every preview iframe
      CMS.registerPreviewStyle(`
        * { box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
          background: #fff;
          color: #000;
          margin: 0;
          font-size: 14px;
        }
        .body-content h1 { font-size: 1.375rem; font-weight: 600; margin: 1.5rem 0 0.5rem; }
        .body-content h2 { font-size: 1.125rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
        .body-content h3 { font-size: 1rem;     font-weight: 600; margin: 1rem 0 0.25rem; }
        .body-content p  { margin: 0.75rem 0; line-height: 1.6; }
        .body-content ul, .body-content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
        .body-content li { margin: 0.25rem 0; }
        .body-content strong { font-weight: 600; }
        .body-content em    { font-style: italic; }
        .body-content a     { color: #000; text-decoration: underline; }
      `, { raw: true });

      // ─── Helpers ───────────────────────────────────────────────────────────

      var BASE = 'https://artbyt-web.vercel.app';

      // Resolves an image field value to a usable URL for the preview iframe.
      // getAsset handles blob: URLs (unsaved uploads) and maps stored paths
      // through public_folder. Falls back to prepending BASE for plain paths.
      function resolveImage(getAsset, path) {
        if (!path) return '';
        var asset = getAsset(path);
        if (asset && asset.toString() !== path) return asset.toString();
        return path.startsWith('http') || path.startsWith('blob:') ? path : BASE + path;
      }

      var hr   = h('hr', { style: { border: 'none', borderTop: '1px solid #e5e7eb', margin: '0 0 0.75rem' } });
      var hrLg = h('hr', { style: { border: 'none', borderTop: '1px solid #e5e7eb', margin: '0 0 1.5rem'  } });

      // ─── Projekt-förhandsgranskning — matchar /projects/[slug] ─────────────

      var ProjectPreview = createClass({
        render: function () {
          var entry       = this.props.entry;
          var title       = entry.getIn(['data', 'title'])         || 'Titel';
          var coverImage  = entry.getIn(['data', 'coverImage'])    || '';
          var coverFit    = entry.getIn(['data', 'coverImageFit']) || 'cover';
          var excerpt     = entry.getIn(['data', 'excerpt'])       || '';
          var description = entry.getIn(['data', 'description'])   || '';
          var body        = this.props.widgetFor('body');
          var coverSrc    = resolveImage(this.props.getAsset, coverImage);

          return h('div', { style: { background: '#fff', padding: '1rem' } },
            hr,
            coverSrc && h('div', {
              style: { width: '100%', aspectRatio: '16 / 9', overflow: 'hidden', marginBottom: '0.75rem' }
            },
              h('img', {
                src: coverSrc,
                alt: title,
                style: {
                  width: '100%', height: '100%',
                  objectFit: coverFit === 'contain' ? 'contain' : 'cover',
                  objectPosition: 'center',
                  display: 'block'
                }
              })
            ),
            h('div', { style: { display: 'flex', gap: '2rem', padding: '1rem 0' } },
              h('div', { style: { width: '50%', flexShrink: 0 } },
                h('span', { style: { fontSize: '0.875rem' } }, title)
              ),
              h('div', { style: { flex: 1, textAlign: 'right', fontSize: '0.875rem', lineHeight: '1.4' } },
                description || excerpt
              )
            ),
            hrLg,
            h('div', { className: 'body-content', style: { columns: 2, columnGap: '3rem' } }, body)
          );
        }
      });

      // ─── Startsida-förhandsgranskning — bildspel ────────────────────────────

      var HomepagePreview = createClass({
        getInitialState: function () { return { index: 0 }; },
        render: function () {
          var entry  = this.props.entry;
          var list   = entry.getIn(['data', 'slides']);
          var slides = list ? list.toJS() : [];
          var idx    = this.state.index;
          var total  = slides.length;

          if (total === 0) {
            return h('div', {
              style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '400px', color: '#888' }
            }, 'Inga bilder tillagda ännu.');
          }

          var slide   = slides[idx];
          var counter = String(idx + 1).padStart(2, '0') + ' / ' + String(total).padStart(2, '0');

          return h('div', {
            style: { background: '#fff', height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden', cursor: 'crosshair' },
            onClick: function () { this.setState({ index: (idx + 1) % total }); }.bind(this)
          },
            h('div', { style: { flex: 1, position: 'relative', overflow: 'hidden', margin: '2rem 0' } },
              h('img', {
                src: resolveImage(this.props.getAsset, slide.url),
                alt: slide.title || '',
                style: { position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', objectPosition: 'center' }
              })
            ),
            h('div', { style: { textAlign: 'center', paddingBottom: '1rem', flexShrink: 0 } },
              h('span', { style: { fontSize: '1.875rem', letterSpacing: '0.1em' } }, counter)
            )
          );
        }
      });

      // ─── Om mig-förhandsgranskning — matchar /about ─────────────────────────

      var AboutPreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || 'Om Mig';
          var image    = entry.getIn(['data', 'image']) || '';
          var body     = this.props.widgetFor('body');
          var imageSrc = resolveImage(this.props.getAsset, image);

          return h('div', { style: { background: '#fff', padding: '1rem' } },
            hr,
            imageSrc && h('div', {
              style: { width: '100%', aspectRatio: '3 / 1', overflow: 'hidden', marginBottom: '0.75rem' }
            },
              h('img', {
                src: imageSrc,
                alt: title,
                style: { width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center', display: 'block' }
              })
            ),
            h('div', { style: { display: 'flex', gap: '2rem', padding: '1rem 0' } },
              h('div', { style: { width: '50%', flexShrink: 0 } },
                h('span', { style: { fontSize: '0.875rem' } }, title)
              ),
              h('div', { style: { flex: 1, display: 'flex', flexDirection: 'column', gap: '0.25rem', alignItems: 'flex-end', fontSize: '0.875rem' } },
                h('span', {}, 'Instagram ↗'),
                h('span', {}, 'LinkedIn ↗')
              )
            ),
            hrLg,
            h('div', { className: 'body-content', style: { columns: 2, columnGap: '3rem' } }, body)
          );
        }
      });

      // ─── Registrera förhandsgranskningsmallar ─────────────────────────────

      CMS.registerPreviewTemplate('projects', ProjectPreview);
      CMS.registerPreviewTemplate('homepage', HomepagePreview);
      CMS.registerPreviewTemplate('about',    AboutPreview);
    </script>
  </body>
</html>
