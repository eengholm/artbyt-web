backend:
  name: github
  repo: eengholm/artbyt-web
  branch: main
  base_url: https://artbyt-web.vercel.app/
  auth_endpoint: /api/auth
  base_path: artbyt-web  # Project is in artbyt-web folder in the repo

# Enable local development mode (for Git operations with decap-server)
# local_backend: true  # Commented out to test OAuth locally

media_folder: "artbyt-web/public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "homepage"
    label: "Startsida"
    files:
      - label: "Startsida"
        name: "homepage"
        file: "artbyt-web/content/settings/homepage.md"
        fields:
          - label: "Bildspel"
            name: "slides"
            widget: "list"
            hint: "Bilder som visas i bildspelet på startsidan."
            required: false
            fields:
              - { label: "Bild", name: "url", widget: "image" }
              - { label: "Titel", name: "title", widget: "string", required: false }

  - name: "footer"
    label: "Sociala länkar"
    files:
      - label: "Sociala länkar"
        name: "footer"
        file: "artbyt-web/content/settings/footer.md"
        fields:
          - { label: "Instagram URL", name: "instagramUrl", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedinUrl", widget: "string", required: false }
  
  - name: "about"
    label: "Om mig"
    files:
      - label: "Om mig"
        name: "about"
        file: "artbyt-web/content/settings/about.md"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "Om Mig" }
          - { label: "Bild", name: "image", widget: "image", default: "/assets/portfolio/authors/tim.jpg" }
          - { label: "Bildposition", name: "imagePosition", widget: "select", options: ["center", "top", "bottom", "left", "right", "top left", "top right", "bottom left", "bottom right"], default: "center", required: false, hint: "Styr bildens fokuspunkt" }
          - { label: "Innehåll", name: "body", widget: "markdown" }
  
  - name: "portfolio"
    label: "Portfolio"
    files:
      - label: "Galleri"
        name: "portfolio"
        file: "artbyt-web/content/settings/portfolio.md"
        fields:
          - label: "Bilder"
            name: "images"
            widget: "list"
            fields:
              - { label: "Bild", name: "url", widget: "image" }
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Bildposition", name: "imagePosition", widget: "select", options: ["center", "top", "bottom", "left", "right", "top left", "top right", "bottom left", "bottom right"], default: "center", required: false, hint: "Styr bildens fokuspunkt" }
              - { label: "Uppdrag", name: "assignment", widget: "relation", collection: "assignments", search_fields: ["title"], value_field: "{{slug}}", display_fields: ["title"], required: false }
              - { label: "Storlek", name: "size", widget: "select", options: ["small", "medium", "large"], default: "medium" }
  
  - name: "assignments"
    label: "Uppdrag"
    folder: "artbyt-web/content/assignments"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-identifierare, t.ex. 'jethwear-aw-24'. Ändra inte efter publicering.", required: false }
      - { label: "Utkast", name: "draft", widget: "boolean", default: false, hint: "Döljer uppdraget utan att ta bort det." }
      - { label: "Datum", name: "date", widget: "datetime", required: false }
      - { label: "Kort beskrivning", name: "excerpt", widget: "text" }
      - { label: "Beskrivning", name: "description", widget: "text", required: false, hint: "Visas på uppdragskortet. Används istället för kort beskrivning om ifyllt." }
      - { label: "Omslagsbild", name: "coverImage", widget: "image" }
      - { label: "Bildpassning", name: "coverImageFit", widget: "select", options: ["cover", "contain"], default: "cover", required: false, hint: "cover beskär bilden, contain visar hela bilden" }
      - { label: "Innehåll", name: "body", widget: "markdown" }
      - label: "Galleribilder"
        name: "gallery"
        widget: "list"
        fields:
          - { label: "Bild", name: "url", widget: "image" }
          - { label: "Bildtext", name: "caption", widget: "string", required: false }
          - { label: "Bildposition", name: "imagePosition", widget: "select", options: ["center", "top", "bottom", "left", "right", "top left", "top right", "bottom left", "bottom right"], default: "center", required: false, hint: "Styr bildens fokuspunkt" }

  - name: "settings"
    label: "Inställningar"
    files:
      - name: "general"
        label: "Allmänt"
        file: "artbyt-web/content/settings/general.md"
        fields:
          - { label: "Sidrubrik", name: "title", widget: "string" }
          - { label: "Webbplatsnamn", name: "siteName", widget: "string", required: false }
          - { label: "Beskrivning", name: "description", widget: "text" }
          - { label: "Kontakt-e-post", name: "contactEmail", widget: "string", hint: "Visas på Om mig-sidan.", pattern: ['^[^@\s]+@[^@\s]+\.[^@\s]+$', 'Måste vara en giltig e-postadress'] }
          - { label: "Telefonnummer", name: "phoneNumber", widget: "string", required: false }
